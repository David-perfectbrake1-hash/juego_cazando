<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Cazando - Edición Pro</title>
    
    <!-- Google Fonts: Tipografía retro + UI moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego()">
    <div class="main-container">
        <h1>JUEGO CAZANDO</h1>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">Developed by: David_RS</p>
        
        <div class="game-wrapper">
            <canvas id="areaJuego" width="500" height="500"></canvas>
            <!-- 💡 Mensaje de ayuda justo debajo del canvas -->
            <p id="mensaje">💡 Usa las flechas del teclado ▲ ◀ ▼ ▶ para mover al gato</p>
        </div>

        <!-- Panel de estadísticas -->
        <div class="ui-panel">
            <div class="stat-box">
                <label>PUNTOS</label>
                <span id="puntos">0</span>
            </div>
            <div class="stat-box">
                <label>TIEMPO</label>
                <span id="tiempo">10</span>
            </div>
        </div>

        <!-- Controles táctiles / D-Pad -->
        <div class="controls-section">
            <button class="btn-dir" onclick="moverArriba()">▲</button>
            <div style="margin: 10px 0;">
                <button class="btn-dir" onclick="moverIzquierda()">◀</button>
                <button class="btn-dir" onclick="moverDerecha()">▶</button>
            </div>
            <button class="btn-dir" onclick="moverAbajo()">▼</button>
        </div>

        <button class="btn-restart" onclick="reiniciarJuego()">REINICIAR PARTIDA</button>
    </div>

    <!-- 🎯 Notificación flotante (aparece al comer) -->
    <div id="notificacion" class="notificacion"></div>

    <!-- 🏆 Modal de fin de juego (victoria o derrota) -->
    <div id="modalFinJuego" class="modal-overlay">
        <div class="modal-contenido">
            <h2 id="tituloModal"></h2>
            <p id="mensajeModal"></p>
            <button onclick="cerrarModalYReiniciar()" class="btn-reiniciar">🔄 Jugar de Nuevo</button>
        </div>
    </div>

    <!-- Scripts: utils.js primero (dependencia), luego cazando.js -->
    <script src="utils.js"></script>
    <script src="cazando.js"></script>
</body>
</html>
